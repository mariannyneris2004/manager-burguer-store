<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estoque')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('estoque')}"></div>

<main class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Controle de estoque</div>
            <h1 class="h3 mb-1">Estoque</h1>
            <p class="text-muted mb-0">Ajuste manualmente quantidades e acompanhe o saldo dos ingredientes.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/compras}">Compras</a>
            <a class="btn btn-outline-secondary" th:href="@{/ingredientes}">Ingredientes</a>
        </div>
    </div>

    <div class="card app-card mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3">Ajuste manual</h2>
            <form class="row g-3 align-items-end" method="post">
                <div class="col-md-6">
                    <label class="form-label">Ingrediente</label>
                    <select class="form-select" name="ingredienteId" required>
                        <option value="">Selecione...</option>
                        <option th:each="ing : ${ingredientes}" th:value="${ing.id}" th:text="${ing.nome}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Quantidade</label>
                    <input type="number" class="form-control" name="quantidade" step="0.001" required/>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary" th:formaction="@{/estoque/ajustar}">Aplicar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card app-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Ingrediente</th>
                    <th class="text-end">Quantidade</th>
                    <th class="text-end">Custo médio</th>
                    <th class="text-end">Valor total</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${estoque}">
                    <td th:text="${item.id}"></td>
                    <td>
                        <span th:each="ing : ${ingredientes}" th:if="${ing.id == item.ingredienteId}" th:text="${ing.nome}" class="fw-semibold"></span>
                    </td>
                    <td class="text-end" th:text="${item.quantidade != null ? #numbers.formatDecimal(item.quantidade, 1, 3) : '-'}"></td>
                    <td class="text-end" th:text="${item.custoMedioAtual != null ? #numbers.formatDecimal(item.custoMedioAtual, 2, 2) : '-'}"></td>
                    <td class="text-end" th:text="${item.valorTotalEstoque != null ? #numbers.formatDecimal(item.valorTotalEstoque, 2, 2) : '-'}"></td>
                    <td class="text-end"><a class="btn btn-sm btn-outline-primary" th:href="@{'/estoque/' + ${item.ingredienteId}}">Detalhes</a></td>
                </tr>
                <tr th:if="${estoque == null or #lists.isEmpty(estoque)}">
                    <td colspan="6" class="text-center text-muted py-4">Nenhum item de estoque cadastrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
