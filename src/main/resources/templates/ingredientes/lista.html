<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ingredientes')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('ingredientes')}"></div>

<main class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Cadastros base</div>
            <h1 class="h3 mb-1">Ingredientes</h1>
            <p class="text-muted mb-0">Gerencie unidades, marcas e custo médio do estoque.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-primary" th:href="@{/ingredientes/novo}">Novo ingrediente</a>
            <a class="btn btn-outline-secondary" th:href="@{/estoque}">Ver estoque</a>
        </div>
    </div>

    <div class="card app-card mb-4">
        <div class="card-body">
            <form class="row g-2" th:action="@{/ingredientes/buscar}" method="get">
                <div class="col-md-9">
                    <input type="text" class="form-control" name="nome" placeholder="Buscar por nome"/>
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-outline-primary" type="submit">Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card app-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Marca</th>
                    <th>Consumo</th>
                    <th>Compra</th>
                    <th class="text-end">Qtd/Compra</th>
                    <th class="text-end">Estoque</th>
                    <th class="text-end">Custo médio</th>
                    <th class="text-end">Valor em estoque</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ing : ${ingredientes}">
                    <td th:text="${ing.id}"></td>
                    <td class="fw-semibold" th:text="${ing.nome}"></td>
                    <td th:text="${ing.marca}"></td>
                    <td th:text="${ing.unidadeConsumo}"></td>
                    <td th:text="${ing.unidadeCompra}"></td>
                    <td class="text-end" th:text="${ing.quantidadePorUnidadeCompra != null ? #numbers.formatDecimal(ing.quantidadePorUnidadeCompra, 1, 3) : '-'}"></td>
                    <td class="text-end" th:text="${ing.estoqueAtual != null ? #numbers.formatDecimal(ing.estoqueAtual, 1, 3) : '-'}"></td>
                    <td class="text-end" th:text="${ing.custoMedioAtual != null ? #numbers.formatDecimal(ing.custoMedioAtual, 2, 2) : '-'}"></td>
                    <td class="text-end" th:text="${ing.valorTotalEstoque != null ? #numbers.formatDecimal(ing.valorTotalEstoque, 2, 2) : '-'}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/ingredientes/editar/' + ${ing.id}}">Editar</a>
                        <form class="d-inline" th:action="@{'/ingredientes/' + ${ing.id} + '/excluir'}" method="post" onsubmit="return confirm('Excluir este ingrediente?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${ingredientes == null or #lists.isEmpty(ingredientes)}">
                    <td colspan="10" class="text-center text-muted py-4">Nenhum ingrediente encontrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
