<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ingrediente</title>
</head>
<body>

<h1 th:text="${ingrediente.id != null} ? 'Editar Ingrediente' : 'Novo Ingrediente'"></h1>

<form th:action="@{/ingredientes/salvar}" th:object="${ingrediente}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Nome:</label>
    <input type="text" th:field="*{nome}" required /><br/>

    <label>Marca:</label>
    <input type="text" th:field="*{marca}" /><br/>

    <label>Medida unitária:</label>
    <input type="text" th:field="*{medidaUnitaria}" placeholder="Ex: g, ml, unidade" /><br/>

    <label>Valor (R$):</label>
    <input type="number" step="0.01" th:field="*{valor}" required /><br/>

    <button type="submit">Salvar</button>
    <a th:href="@{/ingredientes}">Cancelar</a>
</form>

</body>
</html>
