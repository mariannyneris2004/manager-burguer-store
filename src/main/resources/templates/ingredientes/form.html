<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ingrediente')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('ingredientes')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Cadastro</div>
            <h1 class="h3 mb-1" th:text="${ingrediente.id != null} ? 'Editar Ingrediente' : 'Novo Ingrediente'"></h1>
            <p class="text-muted mb-0">Informações base usadas no estoque, compras e composição dos produtos.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/ingredientes}">Voltar</a>
    </div>

    <form th:action="@{/ingredientes/salvar}" th:object="${ingrediente}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="card app-card">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Nome</label><input type="text" class="form-control" th:field="*{nome}" required /></div>
                    <div class="col-md-6"><label class="form-label">Marca</label><input type="text" class="form-control" th:field="*{marca}" /></div>
                    <div class="col-md-4"><label class="form-label">Unidade de consumo</label><input type="text" class="form-control" th:field="*{unidadeConsumo}" placeholder="UNIDADE, G, ML, FATIA" /></div>
                    <div class="col-md-4"><label class="form-label">Unidade de compra</label><input type="text" class="form-control" th:field="*{unidadeCompra}" placeholder="PACOTE, CAIXA, FARDO" /></div>
                    <div class="col-md-4"><label class="form-label">Quantidade por unidade de compra</label><input type="number" class="form-control" step="0.001" min="0" th:field="*{quantidadePorUnidadeCompra}" placeholder="Ex.: 6" /></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a class="btn btn-outline-secondary" th:href="@{/ingredientes}">Cancelar</a>
                </div>
            </div>
        </div>
    </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
