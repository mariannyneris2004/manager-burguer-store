<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ingrediente</title>
</head>
<body>

<h1 th:text="${ingrediente.id != null} ? 'Editar Ingrediente' : 'Novo Ingrediente'"></h1>

<form th:action="@{/ingredientes/salvar}" th:object="${ingrediente}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Nome:</label>
    <input type="text" th:field="*{nome}" required /><br/><br/>

    <label>Marca:</label>
    <input type="text" th:field="*{marca}" /><br/><br/>

    <label>Unidade de consumo:</label>
    <input type="text" th:field="*{unidadeConsumo}" placeholder="UNIDADE, G, ML, FATIA" /><br/><br/>

    <label>Unidade de compra:</label>
    <input type="text" th:field="*{unidadeCompra}" placeholder="PACOTE, CAIXA, FARDO" /><br/><br/>

    <label>Quantidade por unidade de compra:</label>
    <input type="number" step="0.001" min="0" th:field="*{quantidadePorUnidadeCompra}" placeholder="Ex.: 6" /><br/><br/>

    <button type="submit">Salvar</button>
    <a th:href="@{/ingredientes}">Cancelar</a>
</form>

</body>
</html>
