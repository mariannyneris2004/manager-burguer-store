<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastro de Compra</title>
</head>
<body>

<h1 th:text="${compra.id != null ? 'Editar Compra' : 'Nova Compra'}"></h1>

<form th:action="@{/compras/salvar}" th:object="${compra}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <label>Data:</label>
    <input type="date" th:field="*{dataCompra}" required/><br/><br/>

    <h3>Itens da compra</h3>

    <div>
        <label>Ingrediente:</label>
        <select id="ingredienteSelect">
            <option value="">Selecione...</option>
            <option th:each="ing : ${ingredientesDisponiveis}"
                    th:value="${ing.id}"
                    th:text="${ing.nome}"
                    th:attr="data-qtd=${ing.quantidadePorUnidadeCompra},
                             data-consumo=${ing.unidadeConsumo},
                             data-compra=${ing.unidadeCompra}">
            </option>
        </select>

        <label>Quantidade comprada:</label>
        <input type="number" id="qtdCompra" step="0.001" min="0.001"/>

        <label>Unidades por embalagem:</label>
        <input type="number" id="unidadesPorEmbalagem" step="0.001" min="0.001"/>

        <label>Valor da embalagem:</label>
        <input type="number" id="valorUnitario" step="0.01" min="0.01"/>

        <button type="button" onclick="adicionarItem()">Adicionar item</button>
    </div>

    <br/>

    <table border="1" width="100%">
        <thead>
        <tr>
            <th>Ingrediente</th>
            <th>Qtd comprada</th>
            <th>Unid/embalagem</th>
            <th>Qtd estoque</th>
            <th>Valor embalagem</th>
            <th>Custo unitário estoque</th>
            <th>Total item</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tbodyItens">
        <tr th:each="item, i : *{itens}">
            <td>
                <select th:field="*{itens[__${i.index}__].ingredienteId}" required>
                    <option value="">Selecione...</option>
                    <option th:each="ing : ${ingredientesDisponiveis}"
                            th:value="${ing.id}"
                            th:text="${ing.nome}"
                            th:selected="${ing.id == item.ingredienteId}">
                    </option>
                </select>
            </td>
            <td><input type="number" step="0.001" min="0.001" th:field="*{itens[__${i.index}__].quantidade}" required/></td>
            <td><input type="number" step="0.001" min="0.001" th:field="*{itens[__${i.index}__].unidadesPorEmbalagem}" required/></td>
            <td th:text="${item.quantidadeEstoque}"></td>
            <td><input type="number" step="0.01" min="0.01" th:field="*{itens[__${i.index}__].valorUnitario}" required/></td>
            <td th:text="${item.custoUnitarioEstoque}"></td>
            <td th:text="${item.valorTotalItem}"></td>
            <td>
                <button type="button" onclick="removerLinha(this)">Remover</button>
            </td>
        </tr>
        </tbody>
    </table>

    <br/>

    <button type="submit">Salvar</button>
    <a th:href="@{/compras}">Cancelar</a>
</form>

<script th:inline="javascript">
    let indice = /*[[${compra.itens != null ? compra.itens.size() : 0}]]*/ 0;

    function adicionarItem() {
        const select = document.getElementById('ingredienteSelect');
        const ingredienteId = select.value;
        const option = select.options[select.selectedIndex];
        const nome = option.text;
        const qtdCompra = parseFloat(document.getElementById('qtdCompra').value);
        const unidadesPorEmbalagem = parseFloat(document.getElementById('unidadesPorEmbalagem').value);
        const valorUnitario = parseFloat(document.getElementById('valorUnitario').value);

        if (!ingredienteId || !qtdCompra || !unidadesPorEmbalagem || !valorUnitario) {
            alert('Preencha ingrediente, quantidade, unidades por embalagem e valor.');
            return;
        }

        const qtdEstoque = qtdCompra * unidadesPorEmbalagem;
        const custoUnitario = qtdEstoque === 0 ? 0 : (qtdCompra * valorUnitario) / qtdEstoque;
        const total = qtdCompra * valorUnitario;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <input type="hidden" name="itens[${indice}].ingredienteId" value="${ingredienteId}">
                ${nome}
            </td>
            <td><input type="number" step="0.001" min="0.001" name="itens[${indice}].quantidade" value="${qtdCompra}" required></td>
            <td><input type="number" step="0.001" min="0.001" name="itens[${indice}].unidadesPorEmbalagem" value="${unidadesPorEmbalagem}" required></td>
            <td><input type="hidden" name="itens[${indice}].quantidadeEstoque" value="${qtdEstoque.toFixed(3)}">${qtdEstoque.toFixed(3)}</td>
            <td><input type="number" step="0.01" min="0.01" name="itens[${indice}].valorUnitario" value="${valorUnitario}" required></td>
            <td><input type="hidden" name="itens[${indice}].custoUnitarioEstoque" value="${custoUnitario.toFixed(4)}">${custoUnitario.toFixed(4)}</td>
            <td><input type="hidden" name="itens[${indice}].valorTotalItem" value="${total.toFixed(2)}">${total.toFixed(2)}</td>
            <td><button type="button" onclick="removerLinha(this)">Remover</button></td>
        `;
        document.getElementById('tbodyItens').appendChild(tr);
        indice++;

        select.value = '';
        document.getElementById('qtdCompra').value = '';
        document.getElementById('unidadesPorEmbalagem').value = '';
        document.getElementById('valorUnitario').value = '';
    }

    function removerLinha(botao) {
        botao.closest('tr').remove();
    }

    document.getElementById('ingredienteSelect').addEventListener('change', function () {
        const opt = this.options[this.selectedIndex];
        if (!opt.value) return;

        const defaultQtd = opt.getAttribute('data-qtd');
        if (defaultQtd) {
            document.getElementById('unidadesPorEmbalagem').value = defaultQtd;
        }
    });
</script>

</body>
</html>
