<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Detalhes da Compra</title>
</head>
<body>

<h1>Detalhes da Compra</h1>

<p><strong>ID:</strong> <span th:text="${compra.id}"></span></p>
<p><strong>Data:</strong> <span th:text="${compra.dataCompra}"></span></p>
<p><strong>Valor Total:</strong> R$ <span th:text="${compra.valorTotal}"></span></p>

<h3>Itens</h3>

<table border="1">
    <thead>
    <tr>
        <th>Ingrediente</th>
        <th>Qtd comprada</th>
        <th>Unid/embalagem</th>
        <th>Qtd estoque</th>
        <th>Valor embalagem</th>
        <th>Custo unitário estoque</th>
        <th>Total item</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item, i : ${compra.itens}">
        <td th:text="${ingredientes[i.index].nome}"></td>
        <td th:text="${item.quantidade}"></td>
        <td th:text="${item.unidadesPorEmbalagem}"></td>
        <td th:text="${item.quantidadeEstoque}"></td>
        <td th:text="${item.valorUnitario}"></td>
        <td th:text="${item.custoUnitarioEstoque}"></td>
        <td th:text="${item.valorTotalItem}"></td>
    </tr>
    </tbody>
</table>

<p>
    <a th:href="@{/compras}">Voltar</a>
</p>

</body>
</html>
