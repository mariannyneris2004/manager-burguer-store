<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Relatório Financeiro')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('relatorios')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Relatórios</div>
            <h1 class="h3 mb-1">Relatório Financeiro</h1>
            <p class="text-muted mb-0">Compare vendas, compras, CMV, despesas e lucro no período.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/home}">Dashboard</a>
    </div>

    <div th:if="${erro}" class="alert alert-danger"><span th:text="${erro}"></span></div>

    <form method="post" th:action="@{/relatorios/financeiro}" class="card app-card mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Data início</label>
                    <input type="datetime-local" name="inicio" th:value="${relatorio.inicio != null ? relatorio.inicio : ''}" class="form-control" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Data fim</label>
                    <input type="datetime-local" name="fim" th:value="${relatorio.fim != null ? relatorio.fim : ''}" class="form-control" required>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">Gerar</button>
                </div>
            </div>
        </div>
    </form>

    <div th:if="${relatorio.totalVendas != null}">
        <div class="row g-3 mb-4">
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">Vendas</div><div class="fs-5 fw-semibold text-success" th:text="${#numbers.formatDecimal(relatorio.totalVendas, 2, 2)}"></div></div></div></div>
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">Compras</div><div class="fs-5 fw-semibold text-danger" th:text="${#numbers.formatDecimal(relatorio.totalCompras, 2, 2)}"></div></div></div></div>
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">CMV</div><div class="fs-5 fw-semibold text-danger" th:text="${#numbers.formatDecimal(relatorio.cmv, 2, 2)}"></div></div></div></div>
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">Despesas</div><div class="fs-5 fw-semibold text-danger" th:text="${#numbers.formatDecimal(relatorio.totalDespesas, 2, 2)}"></div></div></div></div>
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">Lucro bruto</div><div class="fs-5 fw-semibold" th:classappend="${relatorio.lucroBruto >= 0} ? ' text-success' : ' text-danger'" th:text="${#numbers.formatDecimal(relatorio.lucroBruto, 2, 2)}"></div></div></div></div>
            <div class="col-md-2"><div class="card app-card h-100"><div class="card-body"><div class="text-muted small">Lucro líquido</div><div class="fs-5 fw-semibold" th:classappend="${relatorio.lucroLiquido >= 0} ? ' text-success' : ' text-danger'" th:text="${#numbers.formatDecimal(relatorio.lucroLiquido, 2, 2)}"></div></div></div></div>
        </div>

        <div class="card app-card">
            <div class="card-header bg-white"><h2 class="h5 mb-0">Pedidos no período</h2></div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Data/Hora</th>
                        <th class="text-end">Valor total</th>
                        <th class="text-end">Custo</th>
                        <th class="text-end">Lucro</th>
                        <th class="text-end">Valor pago</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${pedidos}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${#temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(p.valorTotal, 2, 2)}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(p.custoTotal, 2, 2)}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(p.lucroBruto, 2, 2)}"></td>
                        <td class="text-end" th:text="${p.valorPago != null ? #numbers.formatDecimal(p.valorPago, 2, 2) : '-'}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pedidos)}">
                        <td colspan="6" class="text-center text-muted py-4">Nenhum pedido encontrado no período.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
