<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório Financeiro</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container py-4">

    <h2 class="mb-4">Relatório Financeiro</h2>

    <!-- MENSAGEM DE ERRO -->
    <div th:if="${erro}" class="alert alert-danger">
        <span th:text="${erro}"></span>
    </div>

    <!-- FORMULÁRIO -->
    <form method="post" th:action="@{/relatorios/financeiro}" class="card p-3 mb-4 shadow-sm">

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Data Início:</label>
                <input type="datetime-local" name="inicio"
                       th:value="${relatorio.inicio != null ? relatorio.inicio : ''}"
                       class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Data Fim:</label>
                <input type="datetime-local" name="fim"
                       th:value="${relatorio.fim != null ? relatorio.fim : ''}"
                       class="form-control" required>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary">Gerar Relatório</button>
        </div>
    </form>

    <!-- RESULTADOS (só mostra se existir relatório gerado) -->
    <div th:if="${relatorio.totalVendas != null}">

        <!-- CARDS RESUMO -->
        <div class="row text-center mb-4">

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Vendas</h6>
                        <h4 class="text-success" th:text="${#numbers.formatDecimal(relatorio.totalVendas, 2, 2)}"></h4>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Compras</h6>
                        <h4 class="text-danger" th:text="${#numbers.formatDecimal(relatorio.totalCompras, 2, 2)}"></h4>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Despesas</h6>
                        <h4 class="text-danger" th:text="${#numbers.formatDecimal(relatorio.totalDespesas, 2, 2)}"></h4>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Lucro</h6>
                        <h4 th:classappend="${relatorio.lucro >= 0} ? 'text-success' : 'text-danger'"
                            th:text="${#numbers.formatDecimal(relatorio.lucro, 2, 2)}"></h4>
                    </div>
                </div>
            </div>

        </div>

        <!-- TABELA DE PEDIDOS -->
        <h4 class="mt-4">Pedidos no período</h4>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data/Hora</th>
                        <th>Valor Total</th>
                        <th>Valor Pago</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${pedidos}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${#temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${#numbers.formatDecimal(p.valorTotal, 2, 2)}"></td>
                        <td th:text="${p.valorPago != null ? #numbers.formatDecimal(p.valorPago, 2, 2) : '-'}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(pedidos)}">
                        <td colspan="4" class="text-center text-muted py-3">
                            Nenhum pedido encontrado no período.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </div>

    </div>

</div>

</body>
</html>
