<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Adicionais')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('adicionais')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Complementos</div>
            <h1 class="h3 mb-1">Adicionais</h1>
            <p class="text-muted mb-0">Cadastre extras que podem compor produtos e pedidos.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/adicionais/novo}">Novo adicional</a>
    </div>

    <div class="card app-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th class="text-end">Valor base</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="adc : ${adicionais}">
                    <td th:text="${adc.id}"></td>
                    <td class="fw-semibold" th:text="${adc.nome}"></td>
                    <td class="text-end" th:text="${adc.valorBase != null ? #numbers.formatDecimal(adc.valorBase, 2, 2) : '-'}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/adicionais/editar/{id}(id=${adc.id})}">Editar</a>
                        <a class="btn btn-sm btn-outline-danger" th:href="@{'/adicionais/' + ${adc.id} + '/excluir'}" onclick="return confirm('Excluir este adicional?')">Excluir</a>
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/adicionais/' + ${adc.id} + '/ingredientes'}">Ingredientes</a>
                    </td>
                </tr>
                <tr th:if="${adicionais == null or #lists.isEmpty(adicionais)}">
                    <td colspan="4" class="text-center text-muted py-4">Nenhum adicional cadastrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
