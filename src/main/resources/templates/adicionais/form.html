<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Adicional</title>
</head>
<body>

<h1 th:text="${adicional.id != null ? 'Editar Adicional' : 'Novo Adicional'}"></h1>

<form th:action="@{/adicionais/salvar}" th:object="${adicional}" method="post">

    <input type="hidden" th:field="*{id}"/>

    <label>Nome:</label>
    <input type="text" th:field="*{nome}" required/>
    <br/>

    <label>Valor (R$):</label>
    <input type="number" step="0.01" th:field="*{valorBase}" required/>
    <br/>

    <button type="submit">Salvar</button>
</form>

</body>
</html>
