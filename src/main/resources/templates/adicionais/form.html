<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Adicional')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('adicionais')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Cadastro</div>
            <h1 class="h3 mb-1" th:text="${adicional.id != null ? 'Editar Adicional' : 'Novo Adicional'}"></h1>
            <p class="text-muted mb-0">Defina o nome e o valor base do adicional.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/adicionais}">Voltar</a>
    </div>

    <form th:action="@{/adicionais/salvar}" th:object="${adicional}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="card app-card">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8"><label class="form-label">Nome</label><input type="text" class="form-control" th:field="*{nome}" required/></div>
                    <div class="col-md-4"><label class="form-label">Valor base</label><input type="number" class="form-control" step="0.01" min="0" th:field="*{valorBase}" required/></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a class="btn btn-outline-secondary" th:href="@{/adicionais}">Cancelar</a>
                </div>
            </div>
        </div>
    </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
