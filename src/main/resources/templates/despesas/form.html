<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Despesa Geral')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('despesas')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Cadastro</div>
            <h1 class="h3 mb-1" th:text="${despesa.id != null} ? 'Editar Despesa' : 'Nova Despesa'"></h1>
            <p class="text-muted mb-0">Crie despesas únicas, recorrentes ou com data final.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/despesas}">Voltar</a>
    </div>

    <form th:action="@{/despesas/salvar}" th:object="${despesa}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="card app-card">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Nome</label><input type="text" class="form-control" th:field="*{nome}" required/></div>
                    <div class="col-md-3"><label class="form-label">Valor (R$)</label><input type="number" class="form-control" th:field="*{valor}" step="0.01" required/></div>
                    <div class="col-md-3"><label class="form-label">Data da despesa</label><input type="datetime-local" class="form-control" th:field="*{dataDespesa}" required/></div>
                    <div class="col-md-4"><label class="form-label">Frequência</label><select class="form-select" th:field="*{frequencia}" id="frequencia" required><option value="">Selecione...</option><option th:each="f : ${frequencias}" th:value="${f}" th:text="${f}"></option></select></div>
                    <div class="col-md-4" id="possuiFinalContainer" style="display:none;"><label class="form-label d-block">Data final? (apenas recorrentes)</label><div class="form-check mt-2"><input class="form-check-input" type="checkbox" th:field="*{possuiFinal}" id="possuiFinal"/><label class="form-check-label" for="possuiFinal">Possui data final</label></div></div>
                    <div class="col-md-4" id="dataFinalContainer" style="display:none;"><label class="form-label">Data final</label><input type="datetime-local" class="form-control" th:field="*{dataFinal}" id="dataFinal"/></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a class="btn btn-outline-secondary" th:href="@{/despesas}">Cancelar</a>
                </div>
            </div>
        </div>
    </form>

    <script>
        function atualizarCampos() {
            const frequencia = document.getElementById('frequencia').value;
            const possuiFinalContainer = document.getElementById('possuiFinalContainer');
            const possuiFinal = document.getElementById('possuiFinal');
            const dataFinalContainer = document.getElementById('dataFinalContainer');
            const dataFinal = document.getElementById('dataFinal');

            if (frequencia && frequencia !== 'UNICA') {
                possuiFinalContainer.style.display = 'block';
            } else {
                possuiFinalContainer.style.display = 'none';
                dataFinalContainer.style.display = 'none';
                possuiFinal.checked = false;
                dataFinal.required = false;
                dataFinal.value = '';
            }

            if (possuiFinal.checked) {
                dataFinalContainer.style.display = 'block';
                dataFinal.required = true;
            } else {
                dataFinalContainer.style.display = 'none';
                dataFinal.required = false;
            }
        }

        document.getElementById('frequencia').addEventListener('change', atualizarCampos);
        document.getElementById('possuiFinal').addEventListener('change', atualizarCampos);
        window.addEventListener('load', atualizarCampos);
    </script>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
