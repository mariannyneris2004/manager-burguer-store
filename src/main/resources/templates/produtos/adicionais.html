<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Adicionais do Produto')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('produtos')}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Complementos</div>
            <h1 class="h3 mb-1">Adicionais do Produto #<span th:text="${produtoId}"></span></h1>
            <p class="text-muted mb-0">Lista dos adicionais permitidos neste produto.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/produtos}">Voltar</a>
    </div>

    <div class="card app-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Adicional ID</th>
                    <th class="text-center">Selecionado</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${adicionais}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.adicionalId}"></td>
                    <td class="text-center">
                        <span class="badge text-bg-success" th:if="${item.selecionado}">Sim</span>
                        <span class="badge text-bg-secondary" th:unless="${item.selecionado}">Não</span>
                    </td>
                </tr>
                <tr th:if="${adicionais == null or #lists.isEmpty(adicionais)}">
                    <td colspan="3" class="text-center text-muted py-4">Nenhum adicional encontrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
