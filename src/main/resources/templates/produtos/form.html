<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Produto</title>
</head>
<body>

<h1 th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h1>

<form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

  <input type="hidden" th:field="*{id}"/>

  <div>
    <label>Nome:</label>
    <input type="text" th:field="*{nome}" required/>
  </div>

  <br/>

  <div>
    <label>Valor de Venda:</label>
    <input type="number" step="0.01" th:field="*{valorVenda}" required/>
  </div>

  <br/>

  <div>
    <label>Categoria:</label>

    <select th:field="*{categoria}" required>
      <option value="">Selecione...</option>
      <option value="LANCHE">Lanche</option>
      <option value="BEBIDA">Bebida</option>
      <option value="PORCAO">Porção</option>
      <option value="OUTRO">Outro</option>
    </select>
  </div>

  <br/><br/>

  <h3>Ingredientes</h3>

  <div th:each="ing, i : ${ingredientesDisponiveis}">
    <input type="hidden" th:field="*{ingredientes[__${i.index}__].id}" />
    <input type="hidden" th:field="*{ingredientes[__${i.index}__].produtoId}" />
    <input type="hidden" th:field="*{ingredientes[__${i.index}__].ingredienteId}" />

    <label>
      <input type="checkbox" th:field="*{ingredientes[__${i.index}__].selecionado}" />
      <span th:text="${ing.nome}"></span>
    </label>

    <input type="number"
           step="0.01"
           min="0"
           th:field="*{ingredientes[__${i.index}__].quantidade}" />
    <small th:text="${ing.unidadeConsumo}"></small>
    <br/>
  </div>

  <br/><br/>

  <h3>Adicionais Permitidos</h3>

  <div th:each="adc, i : ${adicionaisDisponiveis}">
    <input type="hidden" th:field="*{adicionaisPermitidos[__${i.index}__].id}" />
    <input type="hidden" th:field="*{adicionaisPermitidos[__${i.index}__].produtoId}" />
    <input type="hidden" th:field="*{adicionaisPermitidos[__${i.index}__].adicionalId}" />

    <label>
      <input type="checkbox" th:field="*{adicionaisPermitidos[__${i.index}__].selecionado}" />
      <span th:text="${adc.nome}"></span>
    </label>

    <br/>
  </div>

  <br/><br/>

  <div th:if="${produto.custoUnitario != null}">
      <strong>Custo atual:</strong> <span th:text="${produto.custoUnitario}"></span><br/>
      <strong>Lucro atual:</strong> <span th:text="${produto.lucroUnitario}"></span><br/>
      <strong>Margem:</strong> <span th:text="${#numbers.formatDecimal(produto.margemPercentual, 1, 2)}"></span>%
  </div>

  <br/>

  <button type="submit">Salvar</button>

  <a th:href="@{/produtos}">Cancelar</a>

</form>

</body>
</html>
