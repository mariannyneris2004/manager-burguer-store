<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Produto</title>
</head>
<body>

<h1 th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h1>

<form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

  <input type="hidden" th:field="*{id}"/>

  <!-- Nome -->
  <label>Nome:</label>
  <input type="text" th:field="*{nome}" required/><br/><br/>

  <!-- Valor Venda -->
  <label>Valor de Venda:</label>
  <input type="number" step="0.01" th:field="*{valorVenda}" required/><br/><br/>

  <!-- Categoria -->
  <label>Categoria:</label>
  <select th:field="*{categoria}" required>
    <option value="">Selecione...</option>
    <option value="LANCHE">Lanche</option>
    <option value="BEBIDA">Bebida</option>
    <option value="PORCAO">Porção</option>
    <option value="OUTRO">Outro</option>
  </select>
  <br/><br/>

  <!-- INGREDIENTES -->
  <h3>Ingredientes</h3>

  <div th:each="ing, i : ${ingredientesDisponiveis}">

    <input type="checkbox"
           th:value="${ing.id}"
           th:field="*{ingredientes[__${i.index}__].ingredienteId}" />

    <span th:text="${ing.nome}"></span>

    <!-- Quantidade -->
    <input type="number"
           min="1"
           step="0.01"
           th:field="*{ingredientes[__${i.index}__].quantidade}"
           placeholder="Qtd"/>
  </div>

  <br/>

  <!-- ADICIONAIS PERMITIDOS -->
  <h3>Adicionais Permitidos</h3>

  <div th:each="adc, j : ${adicionaisDisponiveis}">

    <input type="checkbox"
           th:value="${adc.id}"
           th:field="*{adicionaisPermitidos[__${j.index}__].adicionalId}" />

    <span th:text="${adc.nome}"></span>

  </div>

  <br/><br/>

  <button type="submit">Salvar</button>
  <a th:href="@{/produtos}">Cancelar</a>

</form>

</body>
</html>
