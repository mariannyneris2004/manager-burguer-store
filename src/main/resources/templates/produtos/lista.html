<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Produtos')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar('produtos')}"></div>

<main class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <div class="page-eyebrow text-primary mb-1">Cadastro e precificação</div>
            <h1 class="h3 mb-1">Produtos</h1>
            <p class="text-muted mb-0">Gerencie preços, custos e margens dos itens vendidos.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" th:href="@{/produtos/novo}">Novo produto</a>
            <a class="btn btn-outline-secondary" th:href="@{/compras}">Ir para compras</a>
        </div>
    </div>

    <div class="card app-card mb-4">
        <div class="card-body">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="fw-semibold">Filtrar por categoria:</span>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtos}">Todas</a>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtos/categoria/LANCHE}">Lanche</a>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtos/categoria/BEBIDA}">Bebida</a>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtos/categoria/PORCAO}">Porção</a>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtos/categoria/OUTRO}">Outro</a>
            </div>
            <div th:if="${categoria != null}" class="mt-3 alert alert-info mb-0">
                Categoria selecionada: <strong th:text="${categoria}"></strong>
            </div>
        </div>
    </div>

    <div class="card app-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th class="text-end">Valor venda</th>
                    <th class="text-end">Custo</th>
                    <th class="text-end">Lucro</th>
                    <th class="text-end">Margem %</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.id}"></td>
                    <td class="fw-semibold" th:text="${p.nome}"></td>
                    <td><span class="badge text-bg-secondary soft-badge" th:text="${p.categoria}"></span></td>
                    <td class="text-end" th:text="${p.valorVenda != null ? #numbers.formatDecimal(p.valorVenda, 2, 2) : '-'}"></td>
                    <td class="text-end" th:text="${p.custoUnitario != null ? #numbers.formatDecimal(p.custoUnitario, 2, 2) : '-'}"></td>
                    <td class="text-end" th:text="${p.lucroUnitario != null ? #numbers.formatDecimal(p.lucroUnitario, 2, 2) : '-'}"></td>
                    <td class="text-end" th:text="${p.margemPercentual != null ? #numbers.formatDecimal(p.margemPercentual, 1, 2) : '-'}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/produtos/editar/' + ${p.id}}">Editar</a>
                        <form class="d-inline" th:action="@{'/produtos/' + ${p.id} + '/excluir'}" method="post" onsubmit="return confirm('Excluir este produto?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${produtos == null or #lists.isEmpty(produtos)}">
                    <td colspan="8" class="text-center text-muted py-4">Nenhum produto cadastrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
