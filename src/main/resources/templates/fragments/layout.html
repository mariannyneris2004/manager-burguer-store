<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .app-card { border: 0; box-shadow: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.08); }
        .table thead th { white-space: nowrap; }
        .soft-badge { font-weight: 600; letter-spacing: .02em; }
        .page-eyebrow { text-transform: uppercase; letter-spacing: .08em; font-size: .78rem; }
    </style>
</head>

<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/home}">Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegação">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'home'} ? ' active fw-semibold' : ''" th:href="@{/home}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'produtos'} ? ' active fw-semibold' : ''" th:href="@{/produtos}">Produtos</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'ingredientes'} ? ' active fw-semibold' : ''" th:href="@{/ingredientes}">Ingredientes</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'estoque'} ? ' active fw-semibold' : ''" th:href="@{/estoque}">Estoque</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'pedidos'} ? ' active fw-semibold' : ''" th:href="@{/pedidos}">Pedidos</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'compras'} ? ' active fw-semibold' : ''" th:href="@{/compras}">Compras</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'despesas'} ? ' active fw-semibold' : ''" th:href="@{/despesas}">Despesas</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'adicionais'} ? ' active fw-semibold' : ''" th:href="@{/adicionais}">Adicionais</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active == 'relatorios'} ? ' active fw-semibold' : ''" th:href="@{/relatorios/financeiro}">Relatórios</a></li>
            </ul>
        </div>
    </div>
</nav>
</html>
